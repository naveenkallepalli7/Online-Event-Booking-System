spring.application.name=backend

# Server Port
server.port=${PORT:8080}

# Database (H2 Console enabled for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 Configuration
# Using a file-based database for persistence, or mem for pure in-memory
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/event_booking_db}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your_secret_here}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}
